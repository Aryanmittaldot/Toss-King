<script>

// Animated Member Counter

let value = 24387;

setInterval(function(){

value += Math.floor(Math.random()*3);

document.getElementById("members").innerHTML =
value.toLocaleString();

},3000);


// Countdown

let sec = 30;

setInterval(function(){

sec--;

if(sec<0){

sec=30;

}

document.getElementById("countdown").innerHTML=sec;

},1000);


// Floating animation

document.querySelector(".live-box").animate([

{
transform:"translateY(0px)"
},

{
transform:"translateY(-8px)"
},

{
transform:"translateY(0px)"
}

],{

duration:2500,

iterations:Infinity

});


// Button animation

setInterval(function(){

document.querySelector(".join-btn").style.transform="scale(1.03)";

setTimeout(function(){

document.querySelector(".join-btn").style.transform="scale(1)";

},350);

},2500);
